<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 200">
  <style>
    .bar { fill: #4A6FA5; }
    .word {
      fill: #1A1612;
      font-family: Arial, Helvetica, system-ui, sans-serif;
      font-size: 150px;
      font-weight: 800;
      letter-spacing: -4px;
    }
    @media (prefers-color-scheme: dark) {
      .bar { fill: #62a6f9; }
      .word { fill: #f2f2f2; }
    }
  </style>
  <rect class="bar" x="20" y="50" width="15" height="105"/>
  <text class="word" x="60" y="155">MODFLOW AI</text>
</svg>
